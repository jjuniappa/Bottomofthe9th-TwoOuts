<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#030813" />
  <title>9회말 2아웃</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <canvas id="game" aria-label="9회말 2아웃 야구 투구 게임"></canvas>

    <section class="hud" aria-live="polite">
      <div>
        <strong>9회말 · 2아웃</strong>
        <span>1점 차 · 주자 만루</span>
      </div>
      <div class="count" id="count">B 0 · S 0</div>
    </section>

    <section class="message" id="message">
      <h1>9회말 2아웃</h1>
      <p>공을 위로 스와이프해 마지막 타자를 잡아라.</p>
      <button id="startBtn" type="button">마운드에 오르기</button>
    </section>

    <section class="result hidden" id="result">
      <h2 id="resultTitle"></h2>
      <p id="resultText"></p>
      <button id="restartBtn" type="button">다시 던지기</button>
    </section>

    <div class="pitch-info" id="pitchInfo">공의 좌우를 긁으면 반대 방향으로 휩니다</div>
  </main>
  <script src="game.js"></script>
</body>
</html>
